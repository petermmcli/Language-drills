<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Passage — Ο Κόσμος του Άντριαν</title>
<style>
  :root { --accent: #4a6fa5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f9f9f9; color: #222; font-size: 16px; line-height: 1.7; }

  #controls {
    position: sticky; top: 0; z-index: 100;
    background: #f4f4f4; border-bottom: 1px solid #ddd;
    padding: 8px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    font-size: 13px;
  }
  #controls h1 { font-size: 15px; font-weight: bold; margin-right: auto; color: #222; }
  #controls button {
    background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px;
    padding: 5px 12px; cursor: pointer; font-size: 13px;
  }
  #controls button:hover { background: #eee; }
  #controls label { font-weight: bold; color: #555; }

  .voice-toggle { display: flex; gap: 8px; align-items: center; }
  .voice-toggle input[type=radio] { margin: 0 3px 0 0; }
  .voice-toggle label { font-weight: normal; color: #222; }

  #speed-wrap { display: flex; align-items: center; gap: 6px; }
  #speed-slider { width: 140px; }

  #sentence-counter { font-size: 12px; color: #888; white-space: nowrap; }

  #btn-en-toggle { background: #e8e8e8; border: 1px solid #ccc; }
  #btn-en-toggle.on { background: #d0e8ff; border-color: #8ab4f8; }

  #content-wrapper { max-width: 860px; margin: 24px auto; padding: 0 20px; }
  #content-wrapper.show-translation { max-width: 1400px; }

  .para-block { margin-bottom: 24px; }
  .para-block.title-block { margin-bottom: 6px; }
  .para-block.subtitle-block { margin-bottom: 28px; }

  .sentence-row { padding: 4px 0; border-radius: 4px; }
  .sentence-row:hover { background: rgba(74,111,165,0.05); cursor: pointer; }

  .sentence.is-title { font-size: 1.4em; font-weight: bold; color: #222; line-height: 1.4; }
  .sentence.is-subtitle { font-size: 0.95em; color: #666; font-style: italic; }
  .sentence-en.is-title { font-size: 1.1em; font-weight: bold; }
  .sentence-en.is-subtitle { font-size: 0.9em; font-style: italic; }

  .sentence.active { background: #fff3b0; border-radius: 3px; padding: 0 2px; }
  .sentence.played { color: #aaa; }
  .sentence-en.active { background: #cce5ff; border-radius: 3px; padding: 0 2px; }
  .sentence-en.played { color: #bbb; }

  .sentence-en { display: none; color: #555; font-size: 14px; font-style: italic; }

  #content-wrapper.show-translation .sentence-en { display: block; padding-left: 16px; border-left: 3px solid #ddd; margin-top: 2px; }

  @media (min-width: 1000px) {
    #content-wrapper.show-translation .sentence-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start;
    }
    #content-wrapper.show-translation .sentence-en {
      border-left: none; padding-left: 0; margin-top: 0;
    }
  }
</style>
</head>
<body>

<div id="controls">
  <h1>Ο Κόσμος του Άντριαν</h1>
  <div class="voice-toggle">
    <label>Voice:</label>
    <input type="radio" name="voice" id="voice-male" value="el-GR-NestorasNeural" checked>
    <label for="voice-male">&#9794; Nestoras</label>
    <input type="radio" name="voice" id="voice-female" value="el-GR-AthinaNeural">
    <label for="voice-female">&#9792; Athina</label>
  </div>
  <label>Speed:</label>
  <div id="speed-wrap">
    <input type="range" id="speed-slider" min="0.30" max="1.00" step="0.05" value="0.80">
    <span id="speed-label">0.80x</span>
  </div>
  <button id="btn-prev">&#9194; Prev</button>
  <button id="btn-play">&#9654; Play</button>
  <button id="btn-next">&#9193; Next</button>
  <span id="sentence-counter"></span>
  <button id="btn-en-toggle">EN Translation</button>
</div>

<div id="content-wrapper">
</div>
<script>
const greekParas = [["Ο Κόσμος του Άντριαν"], ["Μεταξύ κινδύνου και επιθυμίας"], ["Το πρωινό φως ήταν απαλό στο πρόσωπο της Έλενας.", "Τεντώθηκε στο κρεβάτι, με τις σκέψεις της να πηγαίνουν αμέσως στον Άντριαν.", "Είχε μείνει αρκετές ώρες το βράδυ, κρατώντας το χέρι της, ψιθυρίζοντας στο αυτί της.", "Ένιωθε ζωντανή με τρόπους που δεν είχε γνωρίσει ποτέ.", "Αλλά μαζί του ερχόταν κίνδυνος, και δεν μπορούσε να τον αγνοήσει."], ["Ο Άντριαν εμφανίστηκε στην πόρτα, ντυμένος καθημερινά, αλλά η παρουσία του έκανε την καρδιά της να χτυπά γρήγορα.", "«Καλημέρα», είπε απαλά.", "«Κοιμήθηκες καλά;»"], ["«Κοιμήθηκα... καλύτερα από ό,τι εδώ και καιρό», παραδέχτηκε."], ["Χαμογέλασε, αλλά υπήρχε μια σκιά στα μάτια του.", "«Πρέπει να σου δείξω κάτι», είπε.", "«Κάτι σημαντικό.", "Έλα μαζί μου.»"], ["Η περιέργεια ανακατεύτηκε με φόβο.", "Τον ακολούθησε ήσυχα κατά μήκος του διαδρόμου του κτιρίου.", "Σταμάτησε μπροστά σε μια πόρτα που δεν είχε παρατηρήσει πριν.", "«Αυτό είναι το γραφείο μου», είπε.", "«Συνήθως δεν αφήνω κανέναν να μπει εδώ.", "Αλλά χρειάζεται να δεις...»"], ["Το γραφείο ήταν μεγάλο και γεμάτο χαρτιά, οθόνες και φωτογραφίες ανθρώπων που δεν γνώριζε.", "Ο Άντριαν πήγε σε ένα γραφείο και πήρε ένα φάκελο.", "«Αυτό είναι μέρος του κόσμου μου», είπε, με σοβαρή φωνή.", "«Ασχολούμαι με πράγματα που μπορεί να είναι επικίνδυνα.", "Άνθρωποι με εξουσία, άνθρωποι που κάνουν τη ζωή δύσκολη για τους άλλους.", "Θέλω να καταλάβεις γιατί πρέπει να είμαι προσεκτικός... γιατί δεν μπορείς να εμπιστευτείς ακόμα πολύ.»"], ["Η Έλενα ένιωσε το στομάχι της να στρίβει.", "«Φαίνεται... σοβαρό.»"], ["«Είναι», είπε.", "«Και δεν θέλω να φοβάσαι.", "Αλλά πρέπει να ξέρεις τι μπαίνεις.»"], ["Έγνεψε αργά, με φόβο και ενθουσιασμό να μάχονται μέσα της.", "Ήθελε να τρέξει πίσω στην ασφάλεια του δωματίου της, αλλά δεν μπορούσε.", "Ήθελε να τον καταλάβει, τον κόσμο του και τη θέση της σε αυτόν."], ["Ο Άντριαν άπλωσε το χέρι του στο χέρι της, αγγίζοντάς το ελαφρά.", "«Δεν σε φέρω εδώ για να σε φοβίσω.", "Σε φέρω γιατί σε εμπιστεύομαι.", "Και... γιατί δεν θέλω πλέον να κρύβω τίποτα από σένα.»"], ["Η καρδιά της Έλενας χτύπησε.", "Τα λόγια του την έκαναν να νιώθει επιθυμητή, επιλεγμένη... αλλά και ευάλωτη."], ["Τότε πλησίασε πιο κοντά.", "«Αλλά κάποια μυστικά», ψιθύρισε, με χαμηλή φωνή, «δεν είσαι ακόμα έτοιμη να τα γνωρίσεις.»"], ["Τα μάτια της άνοιξαν διάπλατα.", "«Μυστικά;»"], ["Έγνεψε, με σκούρα μάτια σοβαρά.", "«Θα σου πω όταν έρθει η κατάλληλη στιγμή.", "Αλλά απόψε, κάτι θα συμβεί που θα αλλάξει τα πάντα.", "Είσαι έτοιμη γι' αυτό;»"], ["Η Έλενα ένιωσε ένα μείγμα φόβου και αγωνίας.", "Ήθελε να πει ναι, ήθελε να είναι γενναία, αλλά η καρδιά της χτυπούσε πολύ γρήγορα."], ["«Εγώ... θα προσπαθήσω», ψιθύρισε."], ["Ο Άντριαν χαμογέλασε αμυδρά, σπρώχνοντας μια τούφα μαλλιών από το πρόσωπό της.", "«Καλά.", "Γιατί μετά από απόψε, τίποτα δεν θα είναι το ίδιο.»"], ["Η πόλη έξω περίμενε, γεμάτη δυνατότητες, κίνδυνο και επιθυμία.", "Και η Έλενα ήξερε ότι δεν μπορούσε να γυρίσει πίσω."]];

const englishParas = [["Adrian's World"], ["Between danger and desire"], ["The morning light was soft on Elena's face.", "She stretched out in bed, her thoughts going immediately to Adrian.", "He had stayed for several hours the night before, holding her hand, whispering in her ear.", "She felt alive in ways she had never known.", "But with him came danger, and she couldn't ignore it."], ["Adrian appeared at the door, dressed casually, but his presence made her heart beat fast.", "\"Good morning,\" he said softly.", "\"Did you sleep well?\""], ["\"I slept… better than I have in a long time,\" she admitted."], ["He smiled, but there was a shadow in his eyes.", "\"I need to show you something,\" he said.", "\"Something important.", "Come with me.\""], ["Curiosity mingled with fear.", "She followed him quietly along the building's corridor.", "He stopped in front of a door she hadn't noticed before.", "\"This is my office,\" he said.", "\"I don't usually let anyone come in here.", "But you need to see...\""], ["The office was large and full of papers, screens, and photographs of people she didn't know.", "Adrian went to a desk and picked up a folder.", "\"This is part of my world,\" he said, in a serious voice.", "\"I deal with things that can be dangerous.", "People with power, people who make life difficult for others.", "I want you to understand why I have to be careful... why you can't trust too much just yet.\""], ["Elena felt her stomach churn.", "\"It seems... serious.\""], ["\"It is,\" he said.", "\"And I don't want you to be afraid.", "But you need to know what you're getting into.\""], ["She nodded slowly, fear and excitement battling inside her.", "She wanted to run back to the safety of her room, but she couldn't.", "She wanted to understand him, his world, and her place in it."], ["Adrian placed his hand over hers, touching it lightly.", "\"I didn't bring you here to frighten you.", "I brought you here because I trust you.", "And... because I no longer want to hide anything from you.\""], ["Elena's heart pounded.", "His words made her feel desired, chosen... but also vulnerable."], ["Then he moved closer.", "\"But some secrets,\" he whispered, in a low voice, \"you are not yet ready to know.\""], ["Her eyes went wide.", "\"Secrets?\""], ["He nodded, his dark eyes serious.", "\"I'll tell you when the right moment comes.", "But tonight, something will happen that will change everything.", "Are you ready for that?\""], ["Elena felt a mixture of fear and anxiety.", "She wanted to say yes, she wanted to be brave, but her heart was beating far too fast."], ["\"I... I'll try,\" she whispered."], ["Adrian smiled faintly, pushing a lock of hair from her face.", "\"Good.", "Because after tonight, nothing will be the same.\""], ["The city outside waited, full of possibilities, danger, and desire.", "And Elena knew she could not turn back."]];

const paraRoles = ["title", "subtitle", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body"];
const blockExtraClass = ["title-block", "subtitle-block", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", ""];

const wrapper = document.getElementById('content-wrapper');
const allRows = [];

greekParas.forEach((gSents, pi) => {
  const eSents = englishParas[pi] || [];
  const role = paraRoles[pi] || 'body';
  const block = document.createElement('div');
  block.className = 'para-block' + (blockExtraClass[pi] ? ' ' + blockExtraClass[pi] : '');
  gSents.forEach((gText, si) => {
    const row = document.createElement('div');
    row.className = 'sentence-row';
    const idx = allRows.length;
    const elClass = 'sentence' + (role !== 'body' ? ' is-' + role : '');
    const enClass = 'sentence-en' + (role !== 'body' ? ' is-' + role : '');
    row.innerHTML = `<span class="${elClass}">${gText}</span><span class="${enClass}">${eSents[si] || ''}</span>`;
    row.addEventListener('click', () => jumpTo(idx));
    block.appendChild(row);
    allRows.push({ el: row, greek: gText, en: eSents[si] || '' });
  });
  wrapper.appendChild(block);
});

const sentenceCounter = document.getElementById('sentence-counter');
sentenceCounter.textContent = `0 / ${allRows.length}`;

const AZURE_KEY = '9FHvN91sOhURXdvTqpspl0D9YlrK0y8fxUmj1jR4aVpHPkN1whmHJQQJ99CDACYeBjFXJ3w3AAAYACOGP37b';
const TOKEN_URL = 'https://eastus.api.cognitive.microsoft.com/sts/v1.0/issueToken';
const TTS_URL   = 'https://eastus.tts.speech.microsoft.com/cognitiveservices/v1';
const VOICES = { male: 'el-GR-NestorasNeural', female: 'el-GR-AthinaNeural' };
let voice = VOICES.male;
let speed = 0.80;
let curIdx = 0;
let playing = false;
let curAudio = null;
const cache = {};
let cachedToken = null;
let tokenExpiry = 0;

async function getToken() {
  if (cachedToken && Date.now() < tokenExpiry) return cachedToken;
  const resp = await fetch(TOKEN_URL, { method:'POST', headers:{ 'Ocp-Apim-Subscription-Key': AZURE_KEY, 'Content-Length':'0' }});
  cachedToken = await resp.text();
  tokenExpiry = Date.now() + 8*60*1000;
  return cachedToken;
}

function escXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

document.querySelectorAll('input[name="voice"]').forEach(r => {
  r.addEventListener('change', () => { voice = r.value; Object.keys(cache).forEach(k => delete cache[k]); });
});
document.getElementById('speed-slider').addEventListener('input', e => {
  speed = parseFloat(e.target.value);
  document.getElementById('speed-label').textContent = speed.toFixed(2) + 'x';
  Object.keys(cache).forEach(k => delete cache[k]);
});

async function getAudio(text) {
  const key = voice+'|'+speed+'|'+text;
  if (cache[key]) return cache[key];
  const token = await getToken();
  const rate = speed >= 1 ? '+0%' : '-'+Math.round((1-speed)*100)+'%';
  const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="el-GR"><voice name="${voice}"><prosody rate="${rate}">${escXml(text)}</prosody></voice></speak>`;
  const resp = await fetch(TTS_URL, { method:'POST', headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'application/ssml+xml', 'X-Microsoft-OutputFormat':'audio-24khz-48kbitrate-mono-mp3' }, body: ssml });
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  const a = new Audio(url);
  cache[key] = a;
  return a;
}

function prefetch(idx) { if (idx < allRows.length) getAudio(allRows[idx].greek).catch(()=>{}); }

function setActive(idx) {
  allRows.forEach((r, i) => {
    const gs = r.el.querySelector('.sentence');
    const es = r.el.querySelector('.sentence-en');
    const gBase = gs.className.replace(/ active| played/g, '');
    const eBase = es.className.replace(/ active| played/g, '');
    gs.className = gBase + (i===idx?' active': i<idx?' played':'');
    es.className = eBase + (i===idx?' active': i<idx?' played':'');
  });
  allRows[idx]?.el.scrollIntoView({ behavior:'smooth', block:'center' });
  sentenceCounter.textContent = `${idx+1} / ${allRows.length}`;
}

const btnPlay = document.getElementById('btn-play');

async function playSentence(idx) {
  if (idx >= allRows.length) { playing=false; btnPlay.innerHTML='&#9654; Play'; return; }
  curIdx = idx;
  setActive(idx);
  prefetch(idx+1);
  try {
    const audio = await getAudio(allRows[idx].greek);
    curAudio = audio;
    audio.currentTime = 0;
    await new Promise((res) => { audio.onended = res; audio.onerror = res; audio.play().catch(res); });
  } catch(e) {}
  if (playing) playSentence(idx+1);
}

btnPlay.addEventListener('click', () => {
  if (playing) {
    playing=false; curAudio?.pause(); btnPlay.innerHTML='&#9654; Play';
  } else {
    playing=true; btnPlay.innerHTML='&#9646;&#9646; Pause'; playSentence(curIdx);
  }
});

document.getElementById('btn-prev').addEventListener('click', () => jumpTo(Math.max(0, curIdx-1)));
document.getElementById('btn-next').addEventListener('click', () => jumpTo(Math.min(allRows.length-1, curIdx+1)));

function jumpTo(idx) {
  curIdx = idx;
  if (playing) { curAudio?.pause(); playSentence(idx); }
  else setActive(idx);
}

const btnEn = document.getElementById('btn-en-toggle');
btnEn.addEventListener('click', function() {
  wrapper.classList.toggle('show-translation');
  this.classList.toggle('on');
});
</script>
</body>
</html>

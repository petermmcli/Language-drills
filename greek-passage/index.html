<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Passage — Μια Απόφαση Είναι!</title>
<style>
  :root { --accent: #4a6fa5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f9f9f9; color: #222; font-size: 16px; line-height: 1.7; }

  #controls {
    position: sticky; top: 0; z-index: 100;
    background: #f4f4f4; border-bottom: 1px solid #ddd;
    padding: 8px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    font-size: 13px;
  }
  #controls h1 { font-size: 15px; font-weight: bold; margin-right: auto; color: #222; }
  #controls button {
    background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px;
    padding: 5px 12px; cursor: pointer; font-size: 13px;
  }
  #controls button:hover { background: #eee; }
  #controls label { font-weight: bold; color: #555; }

  .voice-toggle { display: flex; gap: 8px; align-items: center; }
  .voice-toggle input[type=radio] { margin: 0 3px 0 0; }
  .voice-toggle label { font-weight: normal; color: #222; }

  #speed-wrap { display: flex; align-items: center; gap: 6px; }
  #speed-slider { width: 140px; }

  #sentence-counter { font-size: 12px; color: #888; white-space: nowrap; }

  #btn-en-toggle { background: #e8e8e8; border: 1px solid #ccc; }
  #btn-en-toggle.on { background: #d0e8ff; border-color: #8ab4f8; }

  #content-wrapper { max-width: 860px; margin: 24px auto; padding: 0 20px; }
  #content-wrapper.show-translation { max-width: 1400px; }

  .para-block { margin-bottom: 24px; }
  .para-block.title-block { margin-bottom: 6px; }
  .para-block.subtitle-block { margin-bottom: 28px; }

  .sentence-row { padding: 4px 0; border-radius: 4px; }
  .sentence-row:hover { background: rgba(74,111,165,0.05); cursor: pointer; }

  .sentence.is-title { font-size: 1.4em; font-weight: bold; color: #222; line-height: 1.4; }
  .sentence.is-subtitle { font-size: 0.95em; color: #666; font-style: italic; }
  .sentence-en.is-title { font-size: 1.1em; font-weight: bold; }
  .sentence-en.is-subtitle { font-size: 0.9em; font-style: italic; }

  .sentence.active { background: #fff3b0; border-radius: 3px; padding: 0 2px; }
  .sentence.played { color: #aaa; }
  .sentence-en.active { background: #cce5ff; border-radius: 3px; padding: 0 2px; }
  .sentence-en.played { color: #bbb; }

  .sentence-en { display: none; color: #555; font-size: 14px; font-style: italic; }

  #content-wrapper.show-translation .sentence-en { display: block; padding-left: 16px; border-left: 3px solid #ddd; margin-top: 2px; }

  @media (min-width: 1000px) {
    #content-wrapper.show-translation .sentence-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start;
    }
    #content-wrapper.show-translation .sentence-en {
      border-left: none; padding-left: 0; margin-top: 0;
    }
  }
</style>
</head>
<body>

<div id="controls">
  <h1>Μια Απόφαση Είναι!</h1>
  <div class="voice-toggle">
    <label>Voice:</label>
    <input type="radio" name="voice" id="voice-male" value="el-GR-NestorasNeural" checked>
    <label for="voice-male">&#9794; Nestoras</label>
    <input type="radio" name="voice" id="voice-female" value="el-GR-AthinaNeural">
    <label for="voice-female">&#9792; Athina</label>
  </div>
  <label>Speed:</label>
  <div id="speed-wrap">
    <input type="range" id="speed-slider" min="0.30" max="1.00" step="0.05" value="0.80">
    <span id="speed-label">0.80x</span>
  </div>
  <button id="btn-prev">&#9194; Prev</button>
  <button id="btn-play">&#9654; Play</button>
  <button id="btn-next">&#9193; Next</button>
  <span id="sentence-counter"></span>
  <button id="btn-en-toggle">EN Translation</button>
</div>

<div id="content-wrapper">
</div>
<script>
const greekParas = [["Μια Απόφαση Είναι!"], ["Γράμμα της Τόνιας στον Μάρκο"], ["Αγαπημένε μου Μάρκο,", "Γεια σου!", "Διάβασα το μέιλ σου και πραγματικά στενοχωρήθηκα πολύ.", "Είναι δυνατόν 25 χρονών άντρας να μη φροντίζεις καθόλου τον εαυτό σου και την υγεία σου;", "Μου φαίνεται, βέβαια, ότι κουράζεσαι πολύ με τις σπουδές και τη δουλειά σου και έχεις πολύ άγχος."], ["Άκου, λοιπόν, τι θα κάνεις:"], ["Πρώτον, θα κοιμάσαι το βράδυ νωρίτερα, γύρω στις 12:00, γιατί είναι φανερό ότι σου λείπει ύπνος.", "Θα βάζεις χαλαρωτική μουσική ή θα διαβάζεις ένα βιβλίο στο κρεβάτι σου, πριν κοιμηθείς."], ["Κάθε πρωί, όταν ξυπνάς, θα κάνεις ένα ζεστό ντους και μετά θα τρως με την ησυχία σου το πρωινό σου.", "Θα προτιμάς φρυγανιές με μέλι ή μαρμελάδα ή ένα τοστ ή μία κούπα γάλα με δημητριακά ή μία φέτα κέικ.", "Και προσοχή: θα πίνεις τον καφέ σου χωρίς ή με λίγη ζάχαρη!"], ["Στη δουλειά ή το πανεπιστήμιο θα παίρνεις πάντα μαζί σου ένα ελαφρύ κολατσιό, για να το τρως γύρω στις 11:00."], ["Τα μεσημέρια που θα γυρίζεις στο σπίτι, θα τρως μαγειρεμένο φαγητό — μπορεί και η μαμά σου να σε βοηθήσει σε αυτό, αν δεν προλαβαίνεις να μαγειρέψεις εσύ — και θα αποφεύγεις όσο το δυνατόν τα γλυκά.", "Όταν νιώθεις έντονη επιθυμία για γλυκό, θα τρως γιαούρτι με μέλι και ξηρούς καρπούς ή γλυκό του κουταλιού."], ["Επίσης, ψάξε να βρεις τρόπους άσκησης!", "Ξεκίνα να περπατάς ή να τρέχεις τα απογεύματα σε αυτό το ωραίο πάρκο που βρίσκεται δίπλα στο σπίτι σου.", "Επίσης, μπορείς να κάνεις ποδήλατο.", "Η Θεσσαλονίκη είναι η ιδανική πόλη για ποδήλατο.", "Με το απλό περπάτημα χάνεις 300 θερμίδες την ώρα, ενώ με το τρέξιμο 950 θερμίδες."], ["Το βράδυ θα αποφεύγεις τα τηγανητά και τις βαριές σάλτσες και θα επιλέγεις ένα ελαφρύ δείπνο.", "Και, βέβαια, θα πίνεις τουλάχιστον δύο λίτρα νερό την ημέρα.", "Είναι πολύ σημαντικό, μην το ξεχνάς!"], ["Με όλα αυτά, σιγά σιγά θα αρχίσεις να βλέπεις διαφορά στο σώμα σου αλλά και στη διάθεσή σου.", "Ξεκίνα, λοιπόν, τώρα!", "Μην το αναβάλλεις συνεχώς, μία απόφαση είναι!"], ["Δε βλέπω την ώρα να έρθω στη Θεσσαλονίκη και να δω την αλλαγή σου από κοντά!", "Φιλιά, Τόνια"]];

const englishParas = [["It's a Decision!"], ["A letter from Tonia to Marcos"], ["My dear Marcos,", "Hello!", "I read your email and I was really very upset.", "Is it possible for a 25-year-old man not to take care of himself and his health at all?", "It seems to me, of course, that you get very tired with your studies and your work and you have a lot of stress."], ["Listen, then, to what you are going to do:"], ["First, you will go to sleep earlier in the evening, around midnight, because it is obvious that you are lacking sleep.", "You will put on relaxing music or read a book in your bed before going to sleep."], ["Every morning when you wake up, you will have a warm shower and then you will eat your breakfast in peace.", "You will prefer rusks with honey or jam, or a toast, or a cup of milk with cereal, or a slice of cake.", "And be careful: you will drink your coffee without sugar or with just a little!"], ["At work or at university you will always take a light snack with you, to eat it around 11:00."], ["On the afternoons when you come home, you will eat home-cooked food — your mother can help you with that, if you don't have time to cook yourself — and you will avoid sweets as much as possible.", "When you feel an intense craving for something sweet, you will eat yogurt with honey and nuts or a spoon sweet."], ["Also, look for ways to exercise!", "Start walking or running in the afternoons in that beautiful park next to your house.", "You can also ride a bicycle.", "Thessaloniki is the ideal city for cycling.", "With simple walking you burn 300 calories per hour, while with running 950 calories."], ["In the evening you will avoid fried foods and heavy sauces and you will choose a light dinner.", "And of course, you will drink at least two litres of water a day.", "It is very important, don't forget it!"], ["With all of this, little by little you will start to see a difference in your body and also in your mood.", "Start, then, now!", "Don't keep postponing it — it's a decision!"], ["I can't wait to come to Thessaloniki and see your transformation in person!", "Hugs, Tonia"]];

const paraRoles = ["title", "subtitle", "body", "body", "body", "body", "body", "body", "body", "body", "body", "body"];
const blockExtraClass = ["title-block", "subtitle-block", "", "", "", "", "", "", "", "", "", ""];

const wrapper = document.getElementById('content-wrapper');
const allRows = [];

greekParas.forEach((gSents, pi) => {
  const eSents = englishParas[pi] || [];
  const role = paraRoles[pi] || 'body';
  const block = document.createElement('div');
  block.className = 'para-block' + (blockExtraClass[pi] ? ' ' + blockExtraClass[pi] : '');
  gSents.forEach((gText, si) => {
    const row = document.createElement('div');
    row.className = 'sentence-row';
    const idx = allRows.length;
    const elClass = 'sentence' + (role !== 'body' ? ' is-' + role : '');
    const enClass = 'sentence-en' + (role !== 'body' ? ' is-' + role : '');
    row.innerHTML = `<span class="${elClass}">${gText}</span><span class="${enClass}">${eSents[si] || ''}</span>`;
    row.addEventListener('click', () => jumpTo(idx));
    block.appendChild(row);
    allRows.push({ el: row, greek: gText, en: eSents[si] || '' });
  });
  wrapper.appendChild(block);
});

const sentenceCounter = document.getElementById('sentence-counter');
sentenceCounter.textContent = `0 / ${allRows.length}`;

const AZURE_KEY = '9FHvN91sOhURXdvTqpspl0D9YlrK0y8fxUmj1jR4aVpHPkN1whmHJQQJ99CDACYeBjFXJ3w3AAAYACOGP37b';
const TOKEN_URL = 'https://eastus.api.cognitive.microsoft.com/sts/v1.0/issueToken';
const TTS_URL   = 'https://eastus.tts.speech.microsoft.com/cognitiveservices/v1';
const VOICES = { male: 'el-GR-NestorasNeural', female: 'el-GR-AthinaNeural' };
let voice = VOICES.male;
let speed = 0.80;
let curIdx = 0;
let playing = false;
let curAudio = null;
const cache = {};
let cachedToken = null;
let tokenExpiry = 0;

async function getToken() {
  if (cachedToken && Date.now() < tokenExpiry) return cachedToken;
  const resp = await fetch(TOKEN_URL, { method:'POST', headers:{ 'Ocp-Apim-Subscription-Key': AZURE_KEY, 'Content-Length':'0' }});
  cachedToken = await resp.text();
  tokenExpiry = Date.now() + 8*60*1000;
  return cachedToken;
}

function escXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

document.querySelectorAll('input[name="voice"]').forEach(r => {
  r.addEventListener('change', () => { voice = r.value; Object.keys(cache).forEach(k => delete cache[k]); });
});
document.getElementById('speed-slider').addEventListener('input', e => {
  speed = parseFloat(e.target.value);
  document.getElementById('speed-label').textContent = speed.toFixed(2) + 'x';
  Object.keys(cache).forEach(k => delete cache[k]);
});

async function getAudio(text) {
  const key = voice+'|'+speed+'|'+text;
  if (cache[key]) return cache[key];
  const token = await getToken();
  const rate = speed >= 1 ? '+0%' : '-'+Math.round((1-speed)*100)+'%';
  const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="el-GR"><voice name="${voice}"><prosody rate="${rate}">${escXml(text)}</prosody></voice></speak>`;
  const resp = await fetch(TTS_URL, { method:'POST', headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'application/ssml+xml', 'X-Microsoft-OutputFormat':'audio-24khz-48kbitrate-mono-mp3' }, body: ssml });
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  const a = new Audio(url);
  cache[key] = a;
  return a;
}

function prefetch(idx) { if (idx < allRows.length) getAudio(allRows[idx].greek).catch(()=>{}); }

function setActive(idx) {
  allRows.forEach((r, i) => {
    const gs = r.el.querySelector('.sentence');
    const es = r.el.querySelector('.sentence-en');
    const gBase = gs.className.replace(/ active| played/g, '');
    const eBase = es.className.replace(/ active| played/g, '');
    gs.className = gBase + (i===idx?' active': i<idx?' played':'');
    es.className = eBase + (i===idx?' active': i<idx?' played':'');
  });
  allRows[idx]?.el.scrollIntoView({ behavior:'smooth', block:'center' });
  sentenceCounter.textContent = `${idx+1} / ${allRows.length}`;
}

const btnPlay = document.getElementById('btn-play');

async function playSentence(idx) {
  if (idx >= allRows.length) { playing=false; btnPlay.innerHTML='&#9654; Play'; return; }
  curIdx = idx;
  setActive(idx);
  prefetch(idx+1);
  try {
    const audio = await getAudio(allRows[idx].greek);
    curAudio = audio;
    audio.currentTime = 0;
    await new Promise((res) => { audio.onended = res; audio.onerror = res; audio.play().catch(res); });
  } catch(e) {}
  if (playing) playSentence(idx+1);
}

btnPlay.addEventListener('click', () => {
  if (playing) {
    playing=false; curAudio?.pause(); btnPlay.innerHTML='&#9654; Play';
  } else {
    playing=true; btnPlay.innerHTML='&#9646;&#9646; Pause'; playSentence(curIdx);
  }
});

document.getElementById('btn-prev').addEventListener('click', () => jumpTo(Math.max(0, curIdx-1)));
document.getElementById('btn-next').addEventListener('click', () => jumpTo(Math.min(allRows.length-1, curIdx+1)));

function jumpTo(idx) {
  curIdx = idx;
  if (playing) { curAudio?.pause(); playSentence(idx); }
  else setActive(idx);
}

const btnEn = document.getElementById('btn-en-toggle');
btnEn.addEventListener('click', function() {
  wrapper.classList.toggle('show-translation');
  this.classList.toggle('on');
});
</script>
</body>
</html>
